<!doctype html>
<html lang="zh-CN">
    <head>
        <meta charset="UTF-8" />
        <title>极简服务管理面板</title>
        <script src="https://cdn.tailwindcss.com"></script>
        <style>
            .log-box {
                font-family: "Courier New", Courier, monospace;
                min-height: 40px;
                max-height: 150px;
            }
        </style>
    </head>
    <body class="bg-slate-900 text-slate-100 p-6">
        <div class="max-w-6xl mx-auto">
            <header class="mb-10">
                <h1
                    class="text-4xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-emerald-400"
                >
                    服务控制台
                </h1>
                <p class="text-slate-400 mt-2">SSH 驱动 · 无代理管理模式</p>
            </header>

            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                {% for p in projects %}
                <div
                    class="bg-slate-800 rounded-2xl border border-slate-700 p-6 shadow-2xl flex flex-col justify-between"
                >
                    <div>
                        <div class="flex justify-between items-center mb-2">
                            <h2 class="text-xl font-bold text-white">
                                {{ p.name }}
                            </h2>
                            <span
                                class="px-2 py-1 text-[10px] uppercase tracking-wider bg-slate-700 rounded text-slate-300 font-semibold"
                            >
                                {{ p.group }}
                            </span>
                        </div>
                        <p class="text-slate-400 text-sm mb-4">{{ p.memo }}</p>
                        <div
                            class="bg-slate-900/50 p-2 rounded text-[11px] text-blue-400 mb-6 border border-slate-700/50"
                        >
                            SSH: {{ p.host }}:{{ p.port }}
                        </div>
                    </div>

                    <div>
                        <div class="flex gap-3 mb-4">
                            <button
                                onclick="runAction({{ p.id }}, 'start')"
                                id="btn-start-{{ p.id }}"
                                class="flex-1 bg-emerald-600 hover:bg-emerald-500 py-2 rounded-lg font-bold transition-all active:scale-95"
                            >
                                启动
                            </button>
                            <button
                                onclick="runAction({{ p.id }}, 'stop')"
                                id="btn-stop-{{ p.id }}"
                                class="flex-1 bg-rose-600 hover:bg-rose-500 py-2 rounded-lg font-bold transition-all active:scale-95"
                            >
                                停止
                            </button>
                        </div>
                        <div
                            id="res-{{ p.id }}"
                            class="log-box bg-black/50 rounded p-3 text-xs text-slate-400 overflow-y-auto whitespace-pre-wrap border border-slate-700"
                        >
                            等待操作...
                        </div>
                    </div>
                </div>
                {% endfor %}
            </div>
        </div>

        <script>
            async function runAction(id, mode) {
                const logEl = document.getElementById(`res-${id}`);
                const btnStart = document.getElementById(`btn-start-${id}`);
                const btnStop = document.getElementById(`btn-stop-${id}`);

                // 锁定按钮状态
                const originalLog = logEl.innerText;
                logEl.innerText = `正在请求${mode === "start" ? "启动" : "停止"}...`;
                logEl.classList.add("text-blue-400");
                btnStart.disabled = true;
                btnStop.disabled = true;

                try {
                    const formData = new FormData();
                    formData.append("project_id", id);
                    formData.append("mode", mode);

                    const response = await fetch("/action", {
                        method: "POST",
                        body: formData,
                    });
                    const data = await response.json();

                    logEl.innerText = data.output || "执行完成，无返回内容";
                    logEl.classList.remove("text-blue-400");
                    logEl.classList.add(
                        data.output.includes("Error") ||
                            data.output.includes("失败")
                            ? "text-rose-400"
                            : "text-emerald-400",
                    );
                } catch (e) {
                    logEl.innerText = "网络请求失败: " + e;
                    logEl.classList.add("text-rose-400");
                } finally {
                    btnStart.disabled = false;
                    btnStop.disabled = false;
                }
            }
        </script>
    </body>
</html>
