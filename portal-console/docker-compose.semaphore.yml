services:
  semaphore-postgres:
    image: postgres:16-alpine
    container_name: portal-console-semaphore-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: semaphore
      POSTGRES_USER: semaphore
      POSTGRES_PASSWORD: semaphore
    volumes:
      - semaphore_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U semaphore -d semaphore"]
      interval: 10s
      timeout: 5s
      retries: 5

  semaphore:
    image: semaphoreui/semaphore:latest
    container_name: portal-console-semaphore
    restart: unless-stopped
    env_file:
      - ./semaphore/semaphore.env
    environment:
      SEMAPHORE_DB_HOST: semaphore-postgres
      SEMAPHORE_DB_PORT: 5432
      SEMAPHORE_DB_DIALECT: postgres
      SEMAPHORE_DB: semaphore
      SEMAPHORE_DB_NAME: semaphore
      SEMAPHORE_DB_USER: semaphore
      SEMAPHORE_DB_PASS: semaphore
      SEMAPHORE_PLAYBOOK_PATH: /tmp/semaphore/
      SEMAPHORE_ADMIN: admin
      SEMAPHORE_ADMIN_NAME: admin
      SEMAPHORE_ADMIN_EMAIL: admin@localhost
      TZ: UTC
    depends_on:
      semaphore-postgres:
        condition: service_healthy
    ports:
      - "3000:3000"

volumes:
  semaphore_postgres_data:
