name = "todoist-cf"
main = "src/worker.js"
compatibility_date = "2026-05-09"

[[d1_databases]]
binding = "DB"
database_name = "todoist_cf"
database_id = "replace-with-your-d1-database-id"

[triggers]
crons = ["*/1 * * * *"]

[vars]
PORTAL_SSO_SECRET = "replace-with-the-same-secret-as-portal-app-record"
SESSION_SECRET = "replace-with-a-random-session-secret"
DEFAULT_LANGUAGE = "zh"
RESEND_API_KEY = ""
